name: EAS Build (Android preview APK)

on:
  workflow_dispatch:

jobs:
  build-android-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (EAS) - Android preview
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx eas-cli@latest build --platform android --profile preview --non-interactive --wait

